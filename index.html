<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Account Creation</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.8.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2025.8.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        h1{
            font-weight: bolder;
            font-family: monospace;
        }
        body { background: linear-gradient(135deg,
             #e0e0ff, #e0ffe0); 
             height: 100vh;
              display: flex;
               align-items: center; 
               justify-content: center; 
               font-family: 'Gill Sans MT'; }
        .card { background: white;
             padding: 30px;
              border-radius: 15px;
               box-shadow: 0 4px 15px rgba(0,0,0,0.1);
                width: 350px;
                 text-align: center; }
        .btn-custom { background: linear-gradient(to right, #ff5f6d, #2193b0, #6dd5ed, #ffff00); 
            color: white; 
            font-weight: bold; 
            border: none;
             width: 100%; }
        #output { margin-top: 15px;
             font-size: 14px;
              color: #555; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Create Account</h2>

        <br>
        <p>Enter your full name (in title case format) - </p>
        <input type="name" id="name" class="form-control mb-1" placeholder="Full Name (Title Case format)">
        
        <br>
        <p>Enter your Username - </p>
        <input type="text" id="user" class="form-control mb-2" placeholder="Username">

        <br>
        <p>Enter your password - </p>
        <input type="password" id="pass" class="form-control mb-3" placeholder="Password">
        
        <button type="button" id="btn" class="btn btn-custom" py-click="verify_account">Sign up</button>
        
        <div id="output"></div>
    </div>

    <script type="py" src="main.py"></script>

</body>
</html>
